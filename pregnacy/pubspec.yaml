name: mamacare
description: Privacy-first pregnancy tracking application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.1.1
  
  # Local Storage
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  path: ^1.8.3
  
  # Security
  flutter_secure_storage: ^9.0.0
  encrypt: ^5.0.3
  
  # Authentication
  local_auth: ^2.1.7
  
  # UI
  cupertino_icons: ^1.0.6
  
  # Networking
  http: ^1.6.0

  # Date/Time
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true